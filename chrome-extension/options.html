<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>レインズ照合ツール - 設定</title>
  <style>
    body { font-family: sans-serif; padding: 24px; min-width: 400px; color: #1e293b; }
    h1 { font-size: 16px; font-weight: 600; margin-bottom: 20px; }
    label { display: block; font-size: 13px; color: #475569; margin-bottom: 4px; }
    input[type="text"], input[type="password"] {
      width: 100%; box-sizing: border-box;
      border: 1px solid #cbd5e1; border-radius: 6px;
      padding: 8px 10px; font-size: 13px; margin-bottom: 14px;
    }
    input:focus { outline: none; border-color: #3b82f6; }
    button {
      background: #1e40af; color: white; border: none;
      padding: 8px 20px; border-radius: 6px; font-size: 13px;
      cursor: pointer;
    }
    button:hover { background: #1d4ed8; }
    #status { margin-top: 12px; font-size: 13px; color: #16a34a; }
    .hint { font-size: 11px; color: #94a3b8; margin-top: -10px; margin-bottom: 14px; }
  </style>
</head>
<body>
  <h1>レインズ照合ツール 設定</h1>

  <label>照合アプリのURL（本番URLを指定してください）</label>
  <input type="text" id="apiBase" placeholder="https://property-recommend-ai.vercel.app" />
  <p class="hint">末尾スラッシュなし。<strong>-git-main- を含むPreview URLは使用不可</strong>（CORSエラー）</p>
  <div id="previewWarning" style="display:none; background:#fef2f2; border:1px solid #fca5a5; border-radius:6px; padding:10px; font-size:12px; color:#b91c1c; margin-bottom:12px; line-height:1.6;"></div>
  <button id="fixBtn" style="display:none; background:#dc2626; margin-bottom:12px;">Preview URLを自動修正</button>

  <label>APIトークン（任意）</label>
  <input type="password" id="token" placeholder="設定している場合のみ入力" />
  <p class="hint">アプリ側で EXTENSION_TOKEN を設定した場合のみ必要です。</p>

  <button id="save">保存</button>
  <div id="status"></div>

  <script src="options.js"></script>
</body>
</html>
