name: Daily Crawl (Playwright)

on:
  schedule:
    # 毎日 8:30 JST (23:30 UTC) — Vercel Cron のメール送信(9:00 JST)より前に完了させる
    - cron: '30 23 * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: 'クロールモード (diff/manual/full/debug)'
        required: false
        default: 'diff'
        type: choice
        options: [diff, manual, full, debug]
      customer_id:
        description: '特定顧客のみ実行（空欄=全顧客）'
        required: false
        default: ''

jobs:
  crawl:
    name: Playwright Crawl → Supabase
    runs-on: ubuntu-latest
    timeout-minutes: 25  # Vercel Pro の300秒制限より十分大きい

    env:
      NEXT_PUBLIC_SUPABASE_URL:   ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY:  ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      CRON_SECRET:                ${{ secrets.CRON_SECRET }}
      # Vercel変数は意図的に未設定 → /api/crawl の IS_VERCEL チェックが false になりクロール実行可
      PORT: 3003

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Build Next.js
        run: npm run build

      - name: Start Next.js server
        run: npm run start &
        env:
          PORT: 3003

      - name: Wait for server to be ready
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:3003/api/health && break || sleep 2
          done

      - name: Run crawl via API
        id: crawl
        run: |
          BODY='{"mode":"${{ github.event.inputs.mode || 'diff' }}"'
          if [ -n "${{ github.event.inputs.customer_id }}" ]; then
            BODY="$BODY,\"customer_id\":\"${{ github.event.inputs.customer_id }}\""
          fi
          BODY="$BODY}"

          curl -sf -X POST http://localhost:3003/api/crawl \
            -H "Content-Type: application/json" \
            -d "$BODY" \
            -o crawl-output.json \
            --max-time 1200

          cat crawl-output.json | python3 -m json.tool || true

      - name: Upload crawl result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: crawl-result-${{ github.run_number }}
          path: crawl-output.json
          retention-days: 14
